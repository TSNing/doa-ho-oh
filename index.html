<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 相对路径，不要加 / */
            background: url("bg.jpg") no-repeat center center;
            background-size: cover;
        }
        .box {
            text-align: center;
            padding: 40px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 0 20px #ffd6e0;
            animation: fade 2s ease-in-out;
        }
        .name {
            font-size: 1.4rem;
            color: #ff8899;
            margin-bottom: 10px;
        }
        h1 {
            color: #ff6b8b;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 1.2rem;
            line-height: 1.8;
        }
        @keyframes fade {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="name">亲爱的一只鱼：</div>
        <h1>🎂 生日快乐！</h1>
        <p>愿岁岁年年，平安喜乐<br>所求皆如愿，所行皆坦途</p>
    </div>
</body>
</html>
